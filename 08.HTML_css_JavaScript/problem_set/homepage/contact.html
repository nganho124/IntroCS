<script>
        // Get the name input field and the span for the warning message
    const nameInput = document.getElementById('name');
    const nameWarning = document.getElementById('name-warning');

        // Add an event listener that triggers when the user clicks away from the input field
    nameInput.addEventListener('blur', function() {
            // Check if the input field is empty (after removing any leading/trailing whitespace)
        if (this.value.trim() === '') {
                // If it's empty, show the warning message
            nameWarning.textContent = 'Name is a required field.';
        } else {
                // If it's not empty, clear the warning message
            nameWarning.textContent = '';
        }
    });
</script>
